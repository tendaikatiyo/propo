<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Propertybook Zimbabwe Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-pY6SsD1YBsEld5Y7D5H/mCr6r7W7/3Yf6k62ISm2NUd4++d4b0/1EZOQeE2zaYJk" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container py-5">
      <header class="mb-4 text-center">
        <p class="eyebrow">Property Intelligence Prototype</p>
        <h1>Propertybook Zimbabwe Analytics</h1>
        <p class="lead text-muted">Live rental listing analytics from Propertybook Zimbabwe.</p>
      </header>

      <div id="summary" class="row g-3 mb-4"></div>

      <section>
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div>
            <h2>Suburb analytics</h2>
            <p class="text-muted mb-0">Aggregated rental metrics by suburb.</p>
          </div>
          <span id="updatedAt" class="text-muted"></span>
        </div>

        <div class="table-responsive shadow-sm rounded bg-white">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Suburb</th>
                <th>City</th>
                <th>Listings</th>
                <th>Average</th>
                <th>Min</th>
                <th>Max</th>
              </tr>
            </thead>
            <tbody id="suburbsTable"></tbody>
          </table>
        </div>
      </section>

      <footer class="mt-5 text-muted small text-center">
        Designed with Bootstrap 5 and vanilla JavaScript.
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
